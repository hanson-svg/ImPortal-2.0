<!DOCTYPE html>
<html>
<head>
  <title>ArcGIS Data Blender</title>
  <script src="lib/xlsx.full.min.js"></script>
  <style>
    body {
      width: 600px;
      font-family: Arial, sans-serif;
      padding: 10px;
      font-size: 12px;
    }
    h1 { font-size: 18px; margin: 10px 0; }
    input { padding: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    button { padding: 8px 12px; cursor: pointer; margin-top: 10px; }
    #processBtn { background-color: #2196F3; color: white; }
    #downloadBtn { background-color: #4CAF50; color: white; }
    #status { margin-top: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 3px; }
    #preview { display: none; margin-top: 20px; max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    h3, h4 { margin: 10px 0 5px 0; }
    pre { background: #f5f5f5; padding: 5px; font-size: 11px; white-space: pre-wrap; word-wrap: break-word; max-height: 150px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>ArcGIS Data Blender</h1>
  <p>Enter Phase ID to filter data:</p>
  <input type="text" id="phaseId" placeholder="Phase ID">
  <br><br>
  <p>Upload spreadsheet (CSV or Excel):</p>
  <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
  <br><br>
  <button id="processBtn">Process and Download</button>
  <button id="downloadBtn" style="display: none; margin-left: 10px; background-color: #4CAF50; color: white; cursor: pointer;">Download Now</button>
  <div id="status"></div>
  
  <div id="preview">
    <h3>Preview</h3>
    <h4>GIS Data (first 5):</h4>
    <pre id="gisPreview"></pre>
    
    <h4>Spreadsheet Data (first 5):</h4>
    <pre id="spreadPreview"></pre>
    
    <h4>Blended Data (first 5):</h4>
    <pre id="blendedPreview"></pre>
  </div>
  <script src="popup.js"></script>
</body>
</html>
